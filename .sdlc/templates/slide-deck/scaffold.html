<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width={DECK_WIDTH}, initial-scale=1.0">
  <title>{DECK_TITLE}</title>
  <style>
    :root {
      --deck-width: {DECK_WIDTH}px;
      --deck-height: {DECK_HEIGHT}px;
      --color-bg: #ffffff;
      --color-text: #0f172a;
      --color-accent: #0dacd6;
      --font-display: system-ui, sans-serif;
      --font-body: system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: var(--font-body);
    }
    #deck {
      position: relative;
      width: var(--deck-width);
      height: var(--deck-height);
      margin: 0 auto;
      overflow: hidden;
      outline: none;
    }
    .slide {
      position: absolute;
      inset: 0;
      width: var(--deck-width);
      height: var(--deck-height);
      background: var(--color-bg);
      display: none;
    }
    .slide.active { display: block; }
    #slide-indicator {
      position: fixed;
      bottom: 12px;
      right: 16px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-family: var(--font-body);
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="deck" tabindex="-1" role="region" aria-label="Slide deck" aria-live="polite">
    <!-- SLIDES: one <section class="slide" data-slide="N"> per slide -->
  </div>
  <div id="slide-indicator" aria-hidden="true"></div>
  <script>
    (function () {
      const deck = document.getElementById('deck');
      const indicator = document.getElementById('slide-indicator');
      const slides = Array.from(deck.querySelectorAll('.slide'));
      let current = 0;

      function isEditableTarget(el) {
        if (!el) return false;
        const tag = el.tagName;
        return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || el.isContentEditable;
      }

      function show(index) {
        if (slides.length === 0) return;
        current = Math.max(0, Math.min(index, slides.length - 1));
        slides.forEach((s, i) => {
          s.classList.toggle('active', i === current);
          s.setAttribute('aria-hidden', i === current ? 'false' : 'true');
        });
        indicator.textContent = (current + 1) + ' / ' + slides.length;
        deck.focus({ preventScroll: true });
      }

      function next() { show(current + 1); }
      function prev() { show(current - 1); }

      document.addEventListener('keydown', (event) => {
        if (isEditableTarget(document.activeElement)) return;
        const key = event.key;
        if (key === 'ArrowRight' || key === 'PageDown' || key === ' ') {
          event.preventDefault();
          next();
        } else if (key === 'ArrowLeft' || key === 'PageUp') {
          event.preventDefault();
          prev();
        } else if (key === 'Home') {
          event.preventDefault();
          show(0);
        } else if (key === 'End') {
          event.preventDefault();
          show(slides.length - 1);
        } else if (/^[1-9]$/.test(key)) {
          const target = parseInt(key, 10) - 1;
          if (target < slides.length) {
            event.preventDefault();
            show(target);
          }
        }
      });

      show(0);
      deck.focus({ preventScroll: true });
    })();
  </script>
</body>
</html>
